name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          # WHY: affected-only diff requires full history; default depth=1 makes HEAD~1 unavailable
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest pytest-cov ruff mypy

      - name: Lint (ruff) — full repo
        run: ruff check .

      - name: Type check (mypy)
        run: mypy --ignore-missing-imports hooks/ scripts/redact.py

      - name: Detect changed areas
        id: changes
        run: |
          # WHY: git diff --name-only produces multiline output that breaks
          # GITHUB_OUTPUT key=value format. Only write boolean flags per area.
          CHANGED=$(git diff --name-only ${{ github.event.before || 'HEAD~1' }} HEAD 2>/dev/null || echo "all")
          if echo "$CHANGED" | grep -q "^hooks/";     then echo "hooks=true"     >> $GITHUB_OUTPUT; fi
          if echo "$CHANGED" | grep -q "^agents/";    then echo "agents=true"    >> $GITHUB_OUTPUT; fi
          if echo "$CHANGED" | grep -q "^skills/";    then echo "skills=true"    >> $GITHUB_OUTPUT; fi
          if echo "$CHANGED" | grep -q "^claude-md/"; then echo "claude-md=true" >> $GITHUB_OUTPUT; fi

      - name: Run targeted tests
        run: |
          if [ "${{ steps.changes.outputs.hooks }}" = "true" ]; then
            echo "Running hook tests..."
            # WHY: hardcoded globs fail with exit 4 when files missing
            HOOK_TESTS=$(find tests/ -name "test_*.py" -type f | sort)
            if [ -n "$HOOK_TESTS" ]; then pytest $HOOK_TESTS -q --tb=short; fi
          fi
          if [ "${{ steps.changes.outputs.agents }}" = "true" ]; then
            echo "Running agent structure tests..."
            pytest tests/test_structure.py -q --tb=short -k "agent" 2>/dev/null || true
          fi

      - name: Run pytest with coverage
        run: |
          pytest tests/ -v --cov=hooks --cov=scripts --cov-report=term-missing
          # WHY: v3.0.0 added 13 new hooks faster than tests. Actual: 49%. Goal: 70%.
          python -m coverage report --fail-under=45

      - name: Verify README metrics match reality
        if: matrix.python-version == '3.12'
        run: |
          # WHY: External audit found README metrics drifting from actual values.
          # This step ensures Evidence Policy applies to our own README.
          ACTUAL_TESTS=$(pytest tests/ -q --no-header 2>/dev/null | tail -1 | grep -oP '\d+(?= passed)')
          ACTUAL_COV=$(python -m coverage report | tail -1 | grep -oP '\d+(?=%)')
          README_TESTS=$(grep -oP 'Tests-\K\d+' README.md | head -1)
          README_COV=$(grep -oP 'Coverage-\K\d+' README.md | head -1)

          echo "Actual: ${ACTUAL_TESTS} tests, ${ACTUAL_COV}% coverage"
          echo "README: ${README_TESTS} tests, ${README_COV}% coverage"

          FAIL=0
          if [ "$ACTUAL_TESTS" != "$README_TESTS" ]; then
            echo "::error::README badge claims ${README_TESTS} tests but actual is ${ACTUAL_TESTS}"
            FAIL=1
          fi
          if [ "$ACTUAL_COV" != "$README_COV" ]; then
            echo "::error::README badge claims ${README_COV}% coverage but actual is ${ACTUAL_COV}%"
            FAIL=1
          fi

          # WHY: Codex audit found badges updated but text summary still stale.
          # Check that ALL test/coverage mentions in README match actual values.
          TEXT_TESTS=$(grep -oP '\*\*\K\d+(?=\s+tests\*\*)' README.md | head -1)
          TEXT_COV=$(grep -oP '\*\*\K\d+(?=%\*\*)' README.md | head -1)
          if [ -n "$TEXT_TESTS" ] && [ "$TEXT_TESTS" != "$ACTUAL_TESTS" ]; then
            echo "::error::README text says **${TEXT_TESTS} tests** but actual is ${ACTUAL_TESTS}"
            FAIL=1
          fi
          if [ -n "$TEXT_COV" ] && [ "$TEXT_COV" != "$ACTUAL_COV" ]; then
            echo "::error::README text says **${TEXT_COV}%** coverage but actual is ${ACTUAL_COV}%"
            FAIL=1
          fi
          exit $FAIL

      - name: Verify doc counts match filesystem
        if: matrix.python-version == '3.12'
        run: |
          ACTUAL_HOOKS=$(ls hooks/*.py | grep -v utils.py | grep -v __pycache__ | wc -l)
          ACTUAL_AGENTS=$(ls agents/*.md | wc -l)
          echo "Actual: ${ACTUAL_HOOKS} hooks, ${ACTUAL_AGENTS} agents"

          # Check architecture.md
          ARCH_AGENTS=$(grep -oP '\d+(?= agents)' docs/architecture.md | head -1)
          ARCH_HOOKS=$(grep -oP '\d+(?= hooks)' docs/architecture.md | head -1)
          FAIL=0
          if [ "$ARCH_AGENTS" != "$ACTUAL_AGENTS" ]; then
            echo "::error::architecture.md says ${ARCH_AGENTS} agents but actual is ${ACTUAL_AGENTS}"
            FAIL=1
          fi
          if [ "$ARCH_HOOKS" != "$ACTUAL_HOOKS" ]; then
            echo "::error::architecture.md says ${ARCH_HOOKS} hooks but actual is ${ACTUAL_HOOKS}"
            FAIL=1
          fi
          exit $FAIL

      - name: Run smoke tests
        run: bash tests/test_all.sh

      - name: Validate Python syntax
        run: |
          for f in hooks/*.py scripts/*.py; do
            python -c "import py_compile, sys; py_compile.compile(sys.argv[1], doraise=True)" "$f"
          done

      - name: Check no secrets in tracked files
        run: |
          if grep -rE "(sk-[a-zA-Z0-9]{20,}|AKIA[0-9A-Z]{16}|ghp_[a-zA-Z0-9]{36,})" \
            --include="*.py" --include="*.md" --include="*.json" --include="*.sh" \
            --exclude="*test_redact*" --exclude="*test_*" \
            .; then
            echo "::error::Potential secret found in tracked files!"
            exit 1
          fi

      - name: Check no author-specific paths in templates
        run: |
          if grep -rF "C:/Users/sboi" --include="*.md" --include="*.json" --include="*.ps1" --include="*.sh" --exclude-dir=tests .; then
            echo "::error::Author-specific path leaked into tracked files!"
            exit 1
          fi

  windows-install:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run PowerShell installer smoke test
        shell: pwsh
        run: .\tests\test_install.ps1
