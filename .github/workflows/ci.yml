name: Tests

# WHY: opt into Node.js 24 now — GitHub Actions forces it on June 2, 2026.
# Without this, actions/checkout@v4 and actions/setup-python@v5 run on
# deprecated Node.js 20 which will break CI after June 2.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# WHY (F-11, security audit 2026-07-12): no explicit permissions block means
# GITHUB_TOKEN gets whatever the org/repo default is -- which can be broad
# ("read and write" is a common org-level default) even though this workflow
# only checks out code, lints, tests, and uploads artifacts. None of that
# needs write access to repo contents, issues, or PRs. Scoping to the
# minimum here follows GitHub's own token-hardening guidance and closes the
# gap without changing any job's actual behavior.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # WHY: weekly eval on Monday 06:00 UTC — catches config drift without
    # burning API credits on every push. Manual trigger via workflow_dispatch
    # for on-demand quality checks.
    - cron: "0 6 * * 1"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      # WHY SHA-pinned, not @v4 (MEDIUM, external security audit 2026-07-07):
      # a tag can be moved to point at a different commit; a commit SHA
      # cannot. SHA verified live against api.github.com/repos/actions/checkout
      # on 2026-07-07 -- comment notes the tag it resolved to for readability.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # WHY: affected-only diff requires full history; default depth=1 makes HEAD~1 unavailable
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # WHY -r requirements.txt (not a hardcoded list): the hardcoded list
        # ignored requirements.txt's version pins entirely, installing
        # whatever "latest" each tool resolved to on the run date. That let
        # ruff/mypy releases change lint/type behavior and break CI with no
        # code change to point to. requirements.txt is now pinned exact and
        # is the single source of truth for CI's toolchain.
        run: pip install -r requirements.txt

      - name: Lint (ruff) — full repo
        run: ruff check .

      - name: Type check (mypy)
        run: mypy --ignore-missing-imports hooks/ scripts/

      - name: Detect changed areas
        id: changes
        run: |
          # WHY: git diff --name-only produces multiline output that breaks
          # GITHUB_OUTPUT key=value format. Only write boolean flags per area.
          CHANGED=$(git diff --name-only ${{ github.event.before || 'HEAD~1' }} HEAD 2>/dev/null || echo "all")
          if echo "$CHANGED" | grep -q "^hooks/";     then echo "hooks=true"     >> $GITHUB_OUTPUT; fi
          if echo "$CHANGED" | grep -q "^agents/";    then echo "agents=true"    >> $GITHUB_OUTPUT; fi
          if echo "$CHANGED" | grep -q "^skills/";    then echo "skills=true"    >> $GITHUB_OUTPUT; fi
          if echo "$CHANGED" | grep -q "^claude-md/"; then echo "claude-md=true" >> $GITHUB_OUTPUT; fi

      - name: Run targeted tests
        run: |
          if [ "${{ steps.changes.outputs.hooks }}" = "true" ]; then
            echo "Running hook tests..."
            # WHY: hardcoded globs fail with exit 4 when files missing
            HOOK_TESTS=$(find tests/ -name "test_*.py" -type f | sort)
            if [ -n "$HOOK_TESTS" ]; then pytest $HOOK_TESTS -q --tb=short; fi
          fi
          if [ "${{ steps.changes.outputs.agents }}" = "true" ]; then
            echo "Running agent structure tests..."
            # WHY (F-11, security audit 2026-07-12): the previous blanket
            # `|| true` swallowed a genuine test FAILURE (exit 1) the same
            # way it swallowed the "no tests matched -k agent" case (exit 5)
            # -- the latter is a harmless edge case (e.g. the one matching
            # test gets renamed), the former is a real regression this step
            # exists to catch. `Run pytest with coverage` below already runs
            # the full suite and would still fail the job either way, but
            # this step should fail loudly at its own point of detection
            # rather than rely on that later step's duplicate coverage.
            # Also dropped `2>/dev/null` -- suppressing stderr hid the actual
            # pytest failure output needed to diagnose it here.
            pytest tests/test_structure.py -q --tb=short -k "agent" || {
              rc=$?
              if [ "$rc" -eq 5 ]; then
                echo "No agent-tagged tests collected -- skipping."
              else
                exit "$rc"
              fi
            }
          fi

      - name: Run pytest with coverage
        run: |
          pytest tests/ -v --cov=hooks --cov=scripts --cov-report=term-missing
          # WHY: threshold raised from 45% → 75% after coverage grew to 81% (972 tests).
          # 75% gives ~6% headroom for new hooks before CI fires.
          python -m coverage report --fail-under=75

      - name: Verify architectural coherence
        # WHY: the declared architecture (skills/registry.yaml capability contracts +
        # architecture/workflows/*.yaml) must stay machine-consistent -- every workflow step
        # resolves to a real skill+capability, the requires-graph is acyclic, no dangling
        # references, verifiers/termination present. A declarative-only guarantee drifts;
        # this makes it executable. See docs/architecture-coupling + scripts/check_architecture.py.
        run: python scripts/check_architecture.py --check

      - name: Verify README metrics match reality
        if: matrix.python-version == '3.12'
        run: |
          # WHY: External audit found README metrics drifting from actual values.
          # This step ensures Evidence Policy applies to our own README.
          ACTUAL_TESTS=$(pytest tests/ -q --no-header 2>/dev/null | tail -1 | grep -oP '\d+(?= passed)')
          ACTUAL_COV=$(python -m coverage report | tail -1 | grep -oP '\d+(?=%)')
          README_TESTS=$(grep -oP 'Tests-\K\d+' README.md | head -1)
          README_COV=$(grep -oP 'Coverage-\K\d+' README.md | head -1)

          echo "Actual: ${ACTUAL_TESTS} tests, ${ACTUAL_COV}% coverage"
          echo "README: ${README_TESTS} tests, ${README_COV}% coverage"

          FAIL=0
          if [ "$ACTUAL_TESTS" != "$README_TESTS" ]; then
            echo "::error::README badge claims ${README_TESTS} tests but actual is ${ACTUAL_TESTS}"
            FAIL=1
          fi
          if [ "$ACTUAL_COV" != "$README_COV" ]; then
            echo "::error::README badge claims ${README_COV}% coverage but actual is ${ACTUAL_COV}%"
            FAIL=1
          fi

          # WHY: Codex audit found badges updated but text summary still stale.
          # Check that ALL test/coverage mentions in README match actual values.
          TEXT_TESTS=$(grep -oP '\*\*\K\d+(?=\s+tests\*\*)' README.md | head -1)
          TEXT_COV=$(grep -oP '\*\*\K\d+(?=%\*\*)' README.md | head -1)
          if [ -n "$TEXT_TESTS" ] && [ "$TEXT_TESTS" != "$ACTUAL_TESTS" ]; then
            echo "::error::README text says **${TEXT_TESTS} tests** but actual is ${ACTUAL_TESTS}"
            FAIL=1
          fi
          if [ -n "$TEXT_COV" ] && [ "$TEXT_COV" != "$ACTUAL_COV" ]; then
            echo "::error::README text says **${TEXT_COV}%** coverage but actual is ${ACTUAL_COV}%"
            FAIL=1
          fi
          exit $FAIL

      - name: Verify doc counts match filesystem
        if: matrix.python-version == '3.12'
        run: |
          # utils.py + severity_calibrator.py + hook_state.py are shared libraries, not counted hooks
          # (severity_calibrator = RFC-003 step 3, not wired until shadow mode = step 5;
          # hook_state = HookState class imported by commit_test_gate/iteration_guard, no
          # stdin/stdout hook protocol -- same exclusion rationale as utils.py).
          # WHY this list must match hooks/registry.yaml's own EXCLUDED section: this line
          # previously omitted hook_state.py, so ACTUAL_HOOKS (89) drifted one above
          # registry.yaml's protocol_hook count (88) -- CI was gating README/architecture.md
          # against an inflated number instead of catching the real drift.
          ACTUAL_HOOKS=$(ls hooks/*.py | grep -v utils.py | grep -v severity_calibrator.py | grep -v hook_state.py | grep -v __pycache__ | wc -l)
          ACTUAL_AGENTS=$(ls agents/*.md | wc -l)
          # WHY: skills count = SKILL.md files under skills/ (core + extensions).
          # This is the only filesystem-grounded definition; used to gate the
          # plugin.json / marketplace.json descriptions (previously ungated → drifted).
          ACTUAL_SKILLS=$(find skills -name SKILL.md | wc -l)
          ACTUAL_RULES=$(ls rules/*.md | wc -l)
          ACTUAL_CORE_SKILLS=$(find skills/core -maxdepth 1 -mindepth 1 -type d | wc -l)
          ACTUAL_EXT_SKILLS=$(find skills/extensions -maxdepth 1 -mindepth 1 -type d | wc -l)
          echo "Actual: ${ACTUAL_HOOKS} hooks, ${ACTUAL_AGENTS} agents, ${ACTUAL_SKILLS} skills, ${ACTUAL_RULES} rules, ${ACTUAL_CORE_SKILLS} core, ${ACTUAL_EXT_SKILLS} ext"

          # Check architecture.md
          ARCH_AGENTS=$(grep -oP '\d+(?= agents)' docs/architecture.md | head -1)
          ARCH_HOOKS=$(grep -oP '\d+(?= hooks)' docs/architecture.md | head -1)
          FAIL=0
          if [ "$ARCH_AGENTS" != "$ACTUAL_AGENTS" ]; then
            echo "::error::architecture.md says ${ARCH_AGENTS} agents but actual is ${ACTUAL_AGENTS}"
            FAIL=1
          fi
          if [ "$ARCH_HOOKS" != "$ACTUAL_HOOKS" ]; then
            echo "::error::architecture.md says ${ARCH_HOOKS} hooks but actual is ${ACTUAL_HOOKS}"
            FAIL=1
          fi

          # WHY: After [AVOID×4] recurrence, README TOTAL-counter mentions
          # (in hero, comparison table, badges, section headers, docs links)
          # were drifting independently of the Tests/Coverage badges checked above.
          # Scan only patterns that unambiguously claim a TOTAL — not category
          # counts like "12 PreToolUse hooks" or "4 agents with memory".
          # Use sed with capture group to extract ONLY the count, not all digits
          # (grep -oP greedy bug: would catch '2' and '3' inside "%2B_3_teams").

          check_pattern() {
            local label="$1" actual="$2" sed_expr="$3"
            local found
            found=$(sed -nE "s|$sed_expr|\1|p" README.md | sort -u)
            for n in $found; do
              if [ "$n" != "$actual" ]; then
                echo "::error::README pattern '$label' has '${n}' but actual is ${actual}"
                FAIL=1
              fi
            done
          }

          # Hook TOTAL patterns (must == ACTUAL_HOOKS)
          check_pattern "hooks badge"         "$ACTUAL_HOOKS" '.*hooks-([0-9]+)_guards.*'
          check_pattern "Backed-by hero"      "$ACTUAL_HOOKS" '.*Backed by ([0-9]+) hooks.*'
          check_pattern "profile-table hooks" "$ACTUAL_HOOKS" '.*\+ ([0-9]+) hooks \+.*'
          check_pattern "section header"      "$ACTUAL_HOOKS" '.*## ([0-9]+) Hooks.*'
          check_pattern "all-hooks docs link" "$ACTUAL_HOOKS" '.*All ([0-9]+) hooks with examples.*'
          check_pattern "hooks-always-on"     "$ACTUAL_HOOKS" '.*badge/([0-9]+)_hooks-always_on.*'

          # Agent TOTAL patterns (must == ACTUAL_AGENTS)
          check_pattern "agents badge"        "$ACTUAL_AGENTS" '.*agents-([0-9]+)_%2B_3_teams.*'
          check_pattern "Backed-by agents"    "$ACTUAL_AGENTS" '.*Backed by [0-9]+ hooks · ([0-9]+) agents.*'
          check_pattern "profile-table agents" "$ACTUAL_AGENTS" '.*\+ ([0-9]+) agents \+.*'
          check_pattern "compare-table agents" "$ACTUAL_AGENTS" '.*\| ([0-9]+) agents \+ 3 squads.*'

          # Skills TOTAL patterns (must == ACTUAL_SKILLS)
          # WHY (2026-07-17): these 2 lines drifted to "123 skills" while actual was
          # 125 (2 new skills added) -- caught only by CI's check_meta loop below
          # failing on the 3 json files, NOT by any README-side gate, because no
          # such gate existed for these 2 mentions. Same "adjective/rephrase evades
          # the pattern" risk as the hooks/agents patterns above -- these are the
          # missing "Skills TOTAL" counterpart to those two sections.
          check_pattern "compare-table skills" "$ACTUAL_SKILLS" '.*agents \+ 3 squads · ([0-9]+) skills.*'
          check_pattern "profile-table skills" "$ACTUAL_SKILLS" '.*all ([0-9]+) skills.*'

          # WHY (2026-06-12): README file-tree section (├── rules/ N ...) was ungated
          # and drifted to stale counts (8/56/14/9/40 vs actual 14/60/15/12/102).
          # These patterns were found manually by an analyst — now gated so CI catches drift.
          check_pattern "file-tree rules"       "$ACTUAL_RULES"       '.*rules/[[:space:]]+([0-9]+) modular.*'
          check_pattern "file-tree hooks"       "$ACTUAL_HOOKS"       '.*hooks/[[:space:]]+([0-9]+) Python.*'
          check_pattern "file-tree agents"      "$ACTUAL_AGENTS"      '.*agents/[[:space:]]+([0-9]+) active.*'
          check_pattern "file-tree core-skills" "$ACTUAL_CORE_SKILLS" '.*core/[[:space:]]+([0-9]+) universal.*'
          check_pattern "file-tree ext-skills"  "$ACTUAL_EXT_SKILLS"  '.*extensions/[[:space:]]+([0-9]+) domain.*'

          # WHY (PR: close audit gap): plugin.json + marketplace.json descriptions
          # embed "N hooks, M agents, K skills" and were NOT gated → drifted to
          # 56/14/40 and 49/14/26 while actual was 60/15/71. Gate all three counts
          # in both files against the same filesystem actuals used above.
          #
          # WHY (external audit 2026-07-16, drift found at 87 vs 88 hooks): this
          # loop originally listed only 2 of the repo's 3 metadata files. There are
          # TWO marketplace.json files -- root (secondary) and .claude-plugin/
          # (the canonical plugin-system location) -- and only the root one was
          # gated, so .claude-plugin/marketplace.json drifted silently to 87.
          # A count is only defended if EVERY file that states it is in this list.
          check_meta() {
            local file="$1" kind="$2" actual="$3"
            local found
            # WHY the "[0-9]+ (word )?${kind}" shape: the same audit found the
            # drifted file phrased it "87 deterministic hooks", which the plain
            # "[0-9]+ hooks" pattern does not match -- the count evaded the gate
            # by adjective, not by absence. Allow one interstitial word so a
            # rephrase cannot silently un-gate a number again.
            found=$(grep -oE "[0-9]+ ([a-z]+ )?${kind}" "$file" | grep -oE "^[0-9]+" | sort -u)
            for n in $found; do
              if [ "$n" != "$actual" ]; then
                echo "::error::${file} says ${n} ${kind} but actual is ${actual}"
                FAIL=1
              fi
            done
          }
          for meta_file in .claude-plugin/plugin.json .claude-plugin/marketplace.json marketplace.json; do
            check_meta "$meta_file" "hooks"  "$ACTUAL_HOOKS"
            check_meta "$meta_file" "agents" "$ACTUAL_AGENTS"
            check_meta "$meta_file" "skills" "$ACTUAL_SKILLS"
          done

          exit $FAIL

      - name: Registry ↔ disk consistency gate
        if: matrix.python-version == '3.12'
        run: |
          # WHY: catches orphan skills (SKILL.md on disk, no registry entry) and
          # ghost skills (registry entry, no SKILL.md on disk) before they accumulate.
          # Defect-class seen in audit 2026-06-10: 7 skills added to disk, registry
          # not updated → skill-manager.sh couldn't find them.
          FAIL=0

          # Disk: skill directory names under skills/core and skills/extensions
          DISK_SKILLS=$(find skills/core skills/extensions -maxdepth 1 -mindepth 1 -type d \
            -exec basename {} \; 2>/dev/null | sort)

          # Registry: skill names listed under core:/extensions:/community: sections
          REGISTRY_SKILLS=$(grep -A1 '  - name:' skills/registry.yaml | \
            grep -v '\-\-' | grep 'name:' | sed 's/.*name: *//' | sort)

          # Orphans: on disk but not in registry
          ORPHANS=$(comm -23 \
            <(echo "$DISK_SKILLS") \
            <(echo "$REGISTRY_SKILLS"))

          # Ghosts: in registry but no disk directory
          GHOSTS=$(comm -13 \
            <(echo "$DISK_SKILLS") \
            <(echo "$REGISTRY_SKILLS"))

          if [ -n "$ORPHANS" ]; then
            echo "::error::Orphan skills (disk directory exists, no registry entry):"
            echo "$ORPHANS" | while read -r s; do echo "  - $s"; done
            FAIL=1
          fi

          if [ -n "$GHOSTS" ]; then
            echo "::warning::Ghost skills (registry entry, no disk directory):"
            echo "$GHOSTS" | while read -r s; do echo "  - $s"; done
            # warning only — some registry entries are .md references without directories
          fi

          if [ $FAIL -eq 0 ]; then
            echo "Registry ↔ disk: OK ($(echo "$DISK_SKILLS" | wc -l) skills consistent)"
          fi
          exit $FAIL

      - name: Run smoke tests
        run: bash tests/test_all.sh

      - name: Validate Python syntax
        run: |
          for f in hooks/*.py scripts/*.py; do
            python -c "import py_compile, sys; py_compile.compile(sys.argv[1], doraise=True)" "$f"
          done

      - name: Check no secrets in tracked files
        run: |
          if grep -rE "(sk-[a-zA-Z0-9]{20,}|AKIA[0-9A-Z]{16}|ghp_[a-zA-Z0-9]{36,})" \
            --include="*.py" --include="*.md" --include="*.json" --include="*.sh" \
            --exclude="*test_redact*" --exclude="*test_*" \
            .; then
            echo "::error::Potential secret found in tracked files!"
            exit 1
          fi

      - name: Check no author-specific paths in templates
        run: |
          if grep -rF "C:/Users/sboi" --include="*.md" --include="*.json" --include="*.ps1" --include="*.sh" --exclude-dir=tests .; then
            echo "::error::Author-specific path leaked into tracked files!"
            exit 1
          fi

      # WHY: notebooklm skill creates SKILL_DIR/data/ (Google auth state,
      # browser cookies, session pointer) and SKILL_DIR/.venv/ (500MB
      # chromium binaries) on first run. If a developer runs the skill
      # from within the repo clone and then `git add -A`, these would be
      # staged. .gitignore catches them — but defence in depth: this CI
      # step fails the PR if any of these paths reach the tracked tree,
      # even if .gitignore is later weakened.
      - name: Check no skill runtime artifacts tracked
        run: |
          FAIL=0
          # Tracked files that match high-risk patterns:
          BAD_FILES=$(git ls-files | grep -E '(skills/(extensions|core)/[^/]+/(data|\.venv)/|/auth_info\.json$|/browser_state/|/state\.json$|/sessions\.json$)' || true)
          if [ -n "$BAD_FILES" ]; then
            echo "::error::Skill runtime artifacts found in tracked files (auth tokens, browser state, venvs should never be committed):"
            echo "$BAD_FILES"
            FAIL=1
          fi
          exit $FAIL

  eval:
    runs-on: ubuntu-latest
    # WHY: eval uses claude -p (real API calls, costs money, non-deterministic).
    # Only runs on manual trigger or weekly schedule — never on every push/PR.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    needs: test

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install claude CLI
        # WHY unpinned (deliberate, not the same class of risk as F-01's
        # third-party clone): this is Anthropic's own first-party package,
        # this job never blocks push/PR (workflow_dispatch/schedule only,
        # continue-on-error: true), and the eval's actual purpose is to
        # catch config drift against the CURRENT Claude Code release --
        # pinning to a fixed version would work against that goal.
        run: npm install -g @anthropic-ai/claude-code

      - name: Run eval framework
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        # WHY: continue-on-error=true — eval failures are informational, not
        # blockers. The eval job reports quality drift without blocking releases.
        continue-on-error: true
        run: bash tests/eval/run_eval.sh --verbose

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: eval-results-${{ github.run_id }}
          path: tests/eval/results/

  windows-install:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Run PowerShell installer smoke test
        shell: pwsh
        run: .\tests\test_install.ps1
