name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest pytest-cov ruff mypy

      - name: Lint (ruff)
        run: ruff check hooks/ scripts/ tests/

      - name: Type check (mypy)
        run: mypy hooks/utils.py hooks/input_guard.py hooks/mcp_circuit_breaker.py hooks/mcp_circuit_breaker_post.py scripts/redact.py

      - name: Run pytest with coverage
        run: pytest tests/ -v --cov=hooks --cov=scripts --cov-report=term-missing

      - name: Run smoke tests
        run: bash tests/test_all.sh

      - name: Validate Python syntax
        run: |
          for f in hooks/*.py scripts/*.py; do
            python -c "import py_compile, sys; py_compile.compile(sys.argv[1], doraise=True)" "$f"
          done

      - name: Check no secrets in tracked files
        run: |
          if grep -rE "(sk-[a-zA-Z0-9]{20,}|AKIA[0-9A-Z]{16}|ghp_[a-zA-Z0-9]{36,})" \
            --include="*.py" --include="*.md" --include="*.json" --include="*.sh" \
            --exclude="*test_redact*" --exclude="*test_*" \
            .; then
            echo "::error::Potential secret found in tracked files!"
            exit 1
          fi
