# Hook Registry — declarative classification of all hooks in hooks/
#
# class:     security | quality | observability
# fail_mode: closed (block workflow on error) | open (allow workflow on error)
# escalation: block | warn | info
# event:     the Claude Code hook event this hook fires on
#
# WHY: single source of truth for hook metadata — used by CI and ops dashboards.
# (No standalone validate_hooks.py script exists in this repo -- CI's own
# "Verify doc counts match filesystem" step is what enforces this file's count.)
# Editing a hook? Update this file in the same PR.

version: "1.0"
generated: "2026-05-15"

# ── EXCLUDED ──────────────────────────────────────────────────────────────────
# These 3 files are shared library code, not hooks (no stdin/stdout hook
# protocol) -- excluded here AND from CI's ACTUAL_HOOKS count
# (.github/workflows/ci.yml "Verify doc counts match filesystem" step).
# The two lists must stay in sync: this file's `hooks:` keys define
# protocol_hook, CI's exclusion grep must match exactly these 3 names, else
# CI's count silently drifts one above this file's (see 2026-07-17 fix).
# utils.py               — shared helpers (parse_stdin, emit_hook_result, hook_main)
# severity_calibrator.py — RFC-003 step 3, not wired until shadow mode = step 5
# hook_state.py          — HookState class imported by commit_test_gate/iteration_guard

# ── SECURITY — fail_mode: closed ──────────────────────────────────────────────
# These hooks can block tool execution. An error in the hook itself is treated
# as a potential threat → block rather than allow (fail-closed).

hooks:
  pre_commit_guard:
    class: security
    fail_mode: closed
    event: PreToolUse
    matcher: Bash
    escalation: block
    description: >
      Guards git commit — blocks commits to main/master, push to public remote,
      and warns on staged .env or debug statements.

  input_guard:
    class: security
    # WHY fail_mode: open, not closed (P0.3, follow-up audit 2026-07-13): the
    # code explicitly fails open on JSON parse failure (input_guard.py's own
    # comment: "must sys.exit(0) on parse failure (fail-open: allow the call
    # to proceed)") -- this field previously said "closed", contradicting
    # the code it describes. escalation: block is accurate for genuine
    # detections (PreToolUse can deny); fail_mode is specifically about the
    # internal-error path, which is deliberately open.
    fail_mode: open
    event: PreToolUse
    # WHY matcher mcp__* only, not "Write|Edit|Bash|mcp__" (P0.3): the actual
    # hooks/settings.json registration is PreToolUse(mcp__*) only -- the
    # broader matcher this field previously claimed was never wired up.
    matcher: "mcp__*"
    escalation: block
    description: >
      Scans OUTBOUND tool_input to mcp__* calls for prompt-injection patterns
      (system override, jailbreak, credential harvesting, data exfiltration,
      command injection, social engineering), normalizing leet-speak and
      Cyrillic confusables first. Denies HIGH-threat payloads. Does not scan
      PII/secrets/SQL-injection shapes (not in its pattern set) and does not
      scan tool_response -- see mcp_response_guard.py for that.

  mcp_response_guard:
    class: security
    fail_mode: open
    event: PostToolUse
    matcher: "mcp__*"
    escalation: warn
    description: >
      Scans mcp__* tool RESPONSES for the same prompt-injection patterns
      input_guard.py scans in tool_input (reuses its scan()/collect_strings()/
      is_high_threat()). PostToolUse fires after the tool call already
      completed -- this hook can only warn via additionalContext, never block
      or undo the response (PostToolUse cannot deny; see F-03/F-12, security
      audit 2026-07-12).

  web_response_guard:
    class: security
    fail_mode: open
    event: PostToolUse
    matcher: "WebFetch|WebSearch"
    escalation: warn
    description: >
      F-02/F-01 residual gap (external audit 2026-07-15): WebFetch/WebSearch
      previously had zero prompt-injection scanning despite pulling external,
      potentially attacker-controlled content into context -- the same risk
      class as an mcp__* response. Reuses input_guard.py's scan()/
      collect_strings()/is_high_threat(), same PostToolUse-cannot-block
      limitation as mcp_response_guard.py.

  permission_policy:
    class: security
    fail_mode: closed
    event: PreToolUse
    matcher: "Bash"
    escalation: block
    description: >
      Programmatic permission gate for Bash — auto-approves safe read-only
      prefixes, auto-denies dangerous patterns (rm -rf, DROP TABLE, force push),
      asks for anything else (including code runners like pytest/npm test).
      Moved from PermissionRequest to PreToolUse (SEC-03, 2026-07-18):
      PermissionRequest only fires when a permission dialog would appear, and
      this repo's Bash(*) allow rule means no dialog ever appears for Bash --
      the hook was never actually invoked under the old event.

  # WHY: security_verify emits a warn (ask), not a hard block — but it is
  # security-class because the consequence of missing it is a security regression.
  security_verify:
    class: security
    fail_mode: closed
    event: PreToolUse
    matcher: "Edit|Write"
    escalation: warn
    description: >
      Detects edits to sensitive files (auth, payments, migrations, secrets)
      and prompts sec-auditor agent review before proceeding.

# ── QUALITY — fail_mode: open ─────────────────────────────────────────────────
# These hooks emit warnings or nudges. A hook error never blocks workflow.
# They enforce CLAUDE.md quality rules at the system level, not memory level.

  evidence_guard:
    class: quality
    fail_mode: open
    event: PostToolUse
    # WHY Skill|Agent, not Agent|Bash (P0.4, follow-up audit 2026-07-13): the
    # actual settings.json registration; the code has no tool_name gate at
    # all (unlike skeptic_auto_trigger.py's VALIDATION_TOOL_NAMES), so this
    # is a documentation-accuracy fix, not a reachability bug.
    matcher: "Skill|Agent"
    escalation: warn
    description: >
      Enforces Evidence Policy markers ([VERIFIED], [INFERRED], etc.) in
      tool responses. Reminds Claude when factual claims lack evidence markers.

  validation_theater_guard:
    class: quality
    fail_mode: open
    event: PostToolUse
    matcher: "Write|Bash"
    escalation: warn
    description: >
      Detects Validation Theater — synthetic test data (create_synthetic_dataset,
      mock_data) combined with perfect scores (F1=1.000). Strongly flags
      (sys.exit(1) on PostToolUse -- a signal, not a preventive block, since
      the tool call already ran) when both signals appear simultaneously;
      warns otherwise.

  skeptic_auto_trigger:
    class: quality
    fail_mode: open
    event: PostToolUse
    matcher: "Agent|Bash"
    escalation: warn
    description: >
      Auto-detects high-confidence claims (100%, F1=1.000, "all passed") and
      suggests /skeptic invocation for independent falsification. Does not block.

  rationalization_detector:
    class: quality
    fail_mode: open
    event: UserPromptSubmit
    matcher: "*"
    escalation: warn
    description: >
      Fires before Claude responds. Detects rationalization excuses ("I already
      know this API", "I'm 90% sure") and injects early counter-argument context.

  drift_guard:
    class: quality
    fail_mode: open
    event: PostToolUse
    matcher: "Skill|Agent"
    escalation: warn
    description: >
      Detects scope drift — warns when Skill/Agent calls match NOT NOW keywords
      from the Scope Fence in activeContext.md.

  memory_guard:
    class: quality
    fail_mode: open
    event: PostToolUse
    matcher: Bash
    escalation: warn
    description: >
      After git commit, checks activeContext.md freshness. Reminds Claude to
      update memory if the file is stale relative to recent commits.

  checkpoint_guard:
    class: quality
    fail_mode: open
    # WHY PreToolUse, not PostToolUse (P0.4, follow-up audit 2026-07-13): the
    # code only reads tool_input (get_tool_input()), never tool_response --
    # it's a pre-execution suggestion (nudge to checkpoint before a risky
    # Bash command runs), matching its actual PreToolUse(Bash) registration.
    event: PreToolUse
    matcher: Bash
    escalation: warn
    description: >
      Detects risky Bash operations (rebase, migration, large deletions) and
      prompts a checkpoint save if activeContext.md is stale.

  read_before_edit:
    class: quality
    fail_mode: open
    event: PreToolUse
    matcher: "Edit|Write"
    escalation: warn
    description: >
      Soft nudge — reminds Claude to verify the target file was Read before
      Edit or Write. Enforces the Verify-Before-Claim principle at tool level.

  syntax_guard:
    class: quality
    fail_mode: open
    event: PreToolUse
    matcher: "Write|Edit"
    escalation: warn
    description: >
      Validates Python (.py) and JS (.js) syntax before disk write using
      ast.parse() and node --check. Catches SyntaxErrors before they run.

  plan_mode_guard:
    class: quality
    fail_mode: open
    event: PostToolUse
    matcher: "Edit|Write"
    escalation: warn
    description: >
      Counts unique files edited per session. At 3+ unique files, reminds
      Claude to activate Plan-First protocol. Suppressed if a plan file exists.

  elicitation_guard:
    class: quality
    fail_mode: open
    event: "Elicitation|ElicitationResult"
    matcher: "*"
    escalation: info
    description: >
      Logs MCP elicitation events to create an audit trail for MCP server
      interactions that request user input (invisible by default).

  instructions_audit:
    class: quality
    fail_mode: open
    event: InstructionsLoaded
    matcher: "*"
    escalation: info
    description: >
      Logs which CLAUDE.md and rules files are loaded at session start.
      Helps diagnose config drift between machines or sessions.

  spot_check_guard:
    class: quality
    fail_mode: open
    event: PostToolUse
    # WHY Skill|Agent, not Agent|Bash (P0.4, follow-up audit 2026-07-13): the
    # actual settings.json registration; the code has no tool_name gate.
    matcher: "Skill|Agent"
    escalation: warn
    description: >
      Enforces the Spot-Check Rule (integrity.md): when a response contains
      10+ factual claims, reminds Claude to verify 3 randomly-chosen ones.

  subagent_verify:
    class: quality
    fail_mode: open
    event: SubagentStop
    matcher: "*"
    escalation: warn
    description: >
      Verifies subagent deliverables before the orchestrator accepts them.
      Flags empty/low-quality results and HIGH/MEDIUM agent findings that
      lack [VERIFIED-tool] evidence (Audit Verification Gate).

  mcp_circuit_breaker:
    class: quality
    fail_mode: open
    event: PreToolUse
    matcher: "mcp__"
    escalation: warn
    description: >
      Implements Circuit Breaker for MCP servers — blocks repeated-failing
      servers (OPEN state) and allows test pass-through (HALF_OPEN state).

  mcp_circuit_breaker_post:
    class: quality
    fail_mode: open
    event: PostToolUse
    matcher: "mcp__"
    escalation: info
    description: >
      Records MCP call result for circuit breaker state machine — success
      resets the failure counter, error increments it. Pairs with mcp_circuit_breaker.

  mcp_locality_guard:
    class: quality
    fail_mode: open
    event: PreToolUse
    matcher: "mcp__context7|mcp__claude_ai|mcp__ollama|mcp__ncbi|mcp__uniprot|mcp__pubmed"
    escalation: info
    description: >
      Soft nudge before external MCP calls — reminds Claude to try
      Read/Grep/Glob first (0 tokens, 0 latency). Excludes utility MCPs.

  task_audit:
    class: quality
    fail_mode: open
    event: "TaskCreated|TaskCompleted"
    matcher: "*"
    escalation: info
    description: >
      Audit trail for task lifecycle — logs creation and completion timestamps.
      Provides session-level productivity metrics and catches abandoned tasks.

# ── OBSERVABILITY — fail_mode: open, non-blocking ─────────────────────────────
# These hooks collect data, inject context, or run background operations.
# Never block. An error is silently ignored.

  session_start:
    class: observability
    fail_mode: open
    event: SessionStart
    matcher: "*"
    escalation: info
    description: >
      Outputs activeContext.md + decisions.md to Claude at session start,
      so Claude has full project context without manual /read commands.

  session_end:
    class: observability
    fail_mode: open
    # WHY SessionEnd, not Stop (P0.4, follow-up audit 2026-07-13): these are
    # two distinct Claude Code hook events (both exist as separate top-level
    # keys in hooks/settings.json) -- session_end.py is only ever registered
    # under SessionEnd; "Stop" was a naming assumption, never the real event.
    event: SessionEnd
    matcher: "*"
    escalation: info
    description: >
      Cleanup at session end — trims logs, records session end timestamp
      to audit trail in ~/.claude/logs/.

  session_save:
    class: observability
    fail_mode: open
    event: Stop
    matcher: "*"
    escalation: info
    description: >
      Checks memory staleness, processes Raw→Wiki notes pipeline, and
      reminds Claude to update activeContext.md before session close.

  stop_failure:
    class: observability
    fail_mode: open
    event: StopFailure
    matcher: "*"
    escalation: warn
    description: >
      Handles API errors (rate limits, auth failures) gracefully with
      specific recovery instructions instead of raw error output.

  worktree_lifecycle:
    class: observability
    fail_mode: open
    event: "WorktreeCreate|WorktreeRemove"
    matcher: "*"
    escalation: info
    description: >
      Tracks worktree creation and removal for experiment traceability.
      Logs lifecycle events to ~/.claude/logs/worktrees.jsonl.

  pre_compact:
    class: observability
    fail_mode: open
    event: PreCompact
    matcher: "*"
    escalation: info
    description: >
      Saves critical context before compaction — updates timestamp, extracts
      pending tasks from activeContext.md into goals.md, deduplicates patterns.md,
      applies progressive compression so important decisions survive /clear.

  post_compact:
    class: observability
    fail_mode: open
    event: PostCompact
    matcher: "*"
    escalation: info
    description: >
      Re-injects critical context after compaction — reminds Claude to re-read
      activeContext.md and CLAUDE.md since compaction may have removed them.

  post_commit_memory:
    class: observability
    fail_mode: open
    event: PostToolUse
    matcher: Bash
    escalation: info
    description: >
      Auto-logs git commits to activeContext.md — maintains a structured commit
      log automatically, unlike memory_guard which only reminds.

  post_tool_failure:
    class: observability
    fail_mode: open
    event: PostToolUseFailure
    matcher: "*"
    escalation: warn
    description: >
      Tracks repeated tool failures and suggests the 4-tier recovery protocol
      (Stuck Detection from CLAUDE.md) when failures accumulate.

  pattern_extractor:
    class: observability
    fail_mode: open
    event: PostToolUse
    matcher: Bash
    escalation: info
    description: >
      After a fix: commit, requires documenting Symptom→Cause→Fix→Lesson
      in patterns.md. Highest-value learning hook — bugs are the best teacher.

  observation_capture:
    class: observability
    fail_mode: open
    event: PostToolUse
    matcher: "Edit|Write"
    escalation: info
    description: >
      Appends one line per Edit/Write operation to a daily session log in
      ~/.claude/memory/raw/session-YYYY-MM-DD.md for session_save processing.

  auto_capture:
    class: observability
    fail_mode: open
    event: PostToolUse
    matcher: Bash
    escalation: info
    description: >
      Captures git commits and pytest failures immediately as raw notes —
      does not wait for session end. Feeds session_save Curator pipeline.

  learning_tracker:
    class: observability
    fail_mode: open
    event: PostToolUse
    matcher: Bash
    escalation: info
    description: >
      After each git commit, surfaces the next unread Claude Code tip from
      the learning catalog. Logs to learning_log.md and injects context nudge.

  ace_reflector:
    class: observability
    fail_mode: open
    event: SubagentStop
    matcher: "*"
    escalation: info
    description: >
      ACE Reflector (arXiv:2510.04618) — fires on every SubagentStop,
      captures approach effectiveness and updates playbook.md with delta scores.

  knowledge_librarian:
    class: observability
    fail_mode: open
    event: SessionStart
    matcher: "*"
    escalation: info
    description: >
      Queries wiki/, patterns.md, and playbook.md for task-relevant entries
      and injects them as context before the first user prompt. ACE Librarian role.
      Scores HOT/WARM/COLD by attention decay (recency × frequency).

  pattern_escalation_review:
    class: observability
    fail_mode: open
    event: SessionStart
    matcher: "*"
    escalation: info
    description: >
      Weekly review of [×N] patterns in patterns.md. Surfaces any pattern at
      [×3] or higher without a [CRITICAL]/[HARD-RULE]/[RULE-PROMOTED] tag,
      prompting the user to either promote to ~/.claude/rules/*.md or
      mark the severity. State persisted at ~/.claude/state/last_pattern_escalation.txt.
      Closes the passive-counter gap — without this, [×N] keeps climbing
      but never triggers an action.

  project_classifier:
    class: observability
    fail_mode: open
    event: SessionStart
    matcher: "*"
    escalation: info
    description: >
      Content-first project-type classifier. Reads CLAUDE.md/README intent
      (signals > folder structure) at SessionStart and writes project_profile.md
      with the detected type (research / data-science / production / mvp /
      unonboarded / ambiguous) to load the matching methodology. Defers to LLM
      on low-confidence signals (hybrid). Part of the adaptive dispatcher.

  estimand_guard:
    class: quality
    fail_mode: open
    event: SessionStart
    matcher: "*"
    escalation: info
    description: >
      Detects claim.md without a paired estimand.md in a project and reminds
      to define the estimand (population/endpoint/MCID/ICE) first, so Skeptic
      can enforce user-defined criteria instead of generic triggers. Part of
      the EstimandOps research methodology layer.

  prompt_wiki_inject:
    class: observability
    fail_mode: open
    event: UserPromptSubmit
    matcher: "*"
    escalation: info
    description: >
      Per-prompt variant of knowledge_librarian — re-queries wiki index when
      topic changes mid-session. Ensures relevant context for every prompt.

  keyword_router:
    class: observability
    fail_mode: open
    event: UserPromptSubmit
    matcher: "*"
    escalation: info
    description: >
      Detects magic keywords (TDD, security audit, ralph, autopilot) and
      suggests skill activation or injects power-mode behavioral instructions.

  routing_floor_classifier:
    class: quality
    fail_mode: open
    event: UserPromptSubmit
    matcher: "*"
    escalation: info
    description: >
      Deterministically classifies a task's SAFETY-FLOOR tier (security / destructive /
      research) from the prompt and injects the mandatory routing floor for it — the
      project_classifier pattern extended to task-tier, so the floor is code-deterministic
      instead of a discretionary LLM reading of routing-policy. Injects context only,
      never blocks (the tool-level gates remain the hard enforcement).

  rationalization_detector:
    # NOTE: also listed under quality — dual-class: detects quality issues
    # via UserPromptSubmit which is also an observability event.
    # Registry entry is under quality above; duplicate omitted here.
    class: quality
    fail_mode: open
    event: UserPromptSubmit
    matcher: "*"
    escalation: warn
    description: "See quality section above."

  thinking_level:
    class: observability
    fail_mode: open
    event: UserPromptSubmit
    matcher: "*"
    escalation: info
    description: >
      Detects task complexity from prompt keywords and suggests the appropriate
      thinking level (/think, /think harder, /ultrathink). Never blocks.

  mentor_nudge:
    class: observability
    fail_mode: open
    event: UserPromptSubmit
    matcher: "*"
    escalation: info
    description: >
      Every 3rd prompt alternates: WHY-comment reminder (mentor protocol)
      and a career interview question matched to the current topic keywords.

  team_rebalance:
    class: observability
    fail_mode: open
    event: TeammateIdle
    matcher: "*"
    escalation: info
    description: >
      Redistributes tasks to idle agent teammates when one finishes early.
      Prevents resource waste in Agent Teams multi-agent sessions.

  webhook_notify:
    class: observability
    fail_mode: open
    # WHY Stop only, not "Stop|PostToolUse" (P0.4, follow-up audit
    # 2026-07-13): only ever registered under Stop; PostToolUse was an
    # unimplemented docstring claim, not a real registration -- see the
    # module docstring for why it wasn't added rather than silently fixed.
    event: Stop
    matcher: "*"
    escalation: info
    description: >
      Sends Slack/Telegram webhook notifications on session events, commits,
      and critical hook triggers. Requires WEBHOOK_URL env var.

  agent_lifecycle:
    class: observability
    fail_mode: open
    event: "SubagentStart|SubagentStop"
    matcher: "*"
    escalation: info
    description: >
      Injects project context at SubagentStart, records duration at SubagentStop.
      Duration data feeds Believability Tracker for agent performance metrics.

  config_audit:
    class: observability
    fail_mode: open
    event: ConfigChange
    matcher: "*"
    escalation: info
    description: >
      Logs every settings.json modification to an audit trail.
      Helps diagnose config drift across machines or sessions.

  direnv_loader:
    class: observability
    fail_mode: open
    event: CwdChanged
    matcher: "*"
    escalation: info
    description: >
      Loads directory-specific .env/.envrc on cwd change (cd equivalent).
      Prevents working with wrong credentials after switching project directories.

  env_reload:
    class: observability
    fail_mode: open
    event: FileChanged
    matcher: ".env|.envrc"
    escalation: info
    description: >
      Reloads environment variables when .env or .envrc is modified.
      Prevents stale env causing mysterious failures during development.

  first_run_check:
    class: observability
    fail_mode: open
    event: SessionStart
    matcher: "*"
    escalation: info
    description: >
      Detects unconfigured environment on first run and emits onboarding
      message with 3 install paths (full, minimal, worktree).

  statusline:
    # WHY no event/matcher fields (P0.4, follow-up audit 2026-07-13): this is
    # NOT registered in hooks/settings.json's `hooks:` event system at all --
    # it's wired via the separate top-level `statusLine` config key (a
    # distinct Claude Code feature, invoked on its own render cadence, not a
    # PreToolUse/PostToolUse/SessionStart event). An earlier version of this
    # entry claimed event: SessionStart, which was never true.
    class: observability
    fail_mode: open
    escalation: info
    description: >
      Renders persistent terminal status bar showing model, context usage,
      git branch, cost, and session duration. Zero token cost (local command).
      Registered via settings.json's top-level statusLine key, not hooks:.

  wiki_reminder:
    class: observability
    fail_mode: open
    event: Stop
    matcher: "*"
    escalation: info
    description: >
      Detects 2+ decision keywords in the last assistant response and fires
      a systemMessage nudge to save architectural decisions to wiki. Debounced 5 min.

  thematic_index_router:
    class: observability
    fail_mode: open
    event: Stop
    matcher: "*"
    escalation: info
    description: >
      Routes new wiki entries to thematic indices (Claude-Code, Lessons, Projects)
      based on content tags. Keeps Obsidian MOCs up to date automatically.

  post_format:
    class: observability
    fail_mode: open
    event: PostToolUse
    matcher: "Edit|Write"
    escalation: info
    description: >
      Auto-formats Python files with ruff format and JS/TS with prettier
      after Edit/Write. Enforces CLAUDE.md coding style at the tool level.

  moc_autolink:
    class: observability
    fail_mode: open
    event: PostToolUse
    matcher: "Write|Edit"
    escalation: info
    description: >
      Auto-links new notes written to ~/.claude/memory/ to relevant MOCs
      based on content tags and keywords. Maintains Obsidian graph structure.

  cogniml_client:
    # WHY no event/matcher fields (P0.4, follow-up audit 2026-07-13): shared
    # library imported by knowledge_librarian.py/session_save.py, not a
    # standalone hook -- never registered in hooks/settings.json under any
    # event. An earlier version of this entry claimed event: SessionStart,
    # which was never true (same class of fix as learning_tips.py above).
    class: library
    description: >
      Lightweight CogniML API client (stdlib-only, fail-open). Provides semantic
      retrieval fallback over local wiki search — queries /api/advise when
      keyword grep returns fewer than 2 results.

  vector_store:
    # WHY no event/matcher fields: shared library imported by
    # knowledge_librarian.py/session_save.py, not a standalone hook -- same
    # fix as cogniml_client.py above (P0.4, follow-up audit 2026-07-13).
    class: library
    description: >
      Local TF-IDF / ChromaDB vector store for wiki semantic search.
      Fallback when keyword grep misses synonyms or related concepts.
      Primary: ChromaDB + sentence-transformers; fallback: stdlib TF-IDF.

  async_wrapper:
    class: observability
    fail_mode: open
    event: "*"
    matcher: "*"
    escalation: info
    description: >
      Universal async launcher — forks the actual hook as a detached subprocess
      and exits immediately (exit 0) so Claude Code is never blocked by slow hooks
      (pattern analysis, memory writes, external API calls).

  learning_tips:
    # WHY no event/fail_mode/matcher/escalation fields (P0.4, follow-up audit
    # 2026-07-13): this is a shared data module (tips catalog), not a hook --
    # it has no main()/stdin-stdout protocol and is never registered in
    # hooks/settings.json. An earlier version of this entry fabricated
    # event: PostToolUse / matcher: Bash for it "for completeness", which was
    # never real -- a CI gate comparing registry claims against actual
    # settings.json registrations correctly flagged it as unregistered.
    class: library
    description: >
      Shared tips catalog imported by learning_tracker.py and session_start.py.
      Provides leveled tips (1=beginner … 5=expert) with next_try actions.

# ── Added P0.4 (follow-up audit 2026-07-13) ──────────────────────────────────
# WHY this whole block exists: a systematic registry-vs-settings.json CI gate
# (TestHooksRegistryConsistency) found 25 hooks/*.py files with NO registry
# entry at all -- registry.yaml's own header claims "single source of truth
# for hook metadata," but roughly a third of all hooks were undocumented.
# Entries below are grouped by what the gate actually found: real registered
# hooks (event/matcher pulled from hooks/settings.json, not guessed), pure
# shared libraries (no event/matcher -- they have no main()/hook protocol),
# and dormant hooks (have their own main() and a docstring-declared intended
# event, but are NOT registered anywhere -- documented as found, not silently
# wired up; enabling one is a behavioral decision requiring its own review,
# not a registry-documentation fix).

  claim_entropy_tracker:
    class: quality
    fail_mode: open
    event: PostToolUse
    matcher: "Edit|Write"
    escalation: warn
    description: >
      Enforces the Perelman monotone invariant on claim_entropy.md tables --
      claim_entropy must strictly decrease with each valid research step.

  commit_test_gate:
    class: quality
    fail_mode: open
    event: "PreToolUse|PostToolUse"
    matcher: "Bash|Edit|Write"
    escalation: warn
    description: >
      Warns at commit time if source .py changed after the last pytest run --
      operationalizes "never claim tests pass without running them."

  experiment_insight:
    class: observability
    fail_mode: open
    event: PostToolUse
    matcher: "Edit|Write"
    escalation: info
    description: >
      Captures mechanistic insights from decision.md writes on
      negative/archived experiments for reuse on other problems.

  goal_budget_guard:
    class: quality
    fail_mode: open
    event: UserPromptSubmit
    matcher: "*"
    escalation: info
    description: >
      Soft reminder to add a turn budget ("or stop after N turns") when
      /goal mode is used without one. Never blocks (exit 0 always).

  goal_stub_detector:
    class: quality
    fail_mode: open
    event: PostToolUse
    matcher: "Edit|Write"
    escalation: warn
    description: >
      Detects stub patterns (pass-only bodies, TODO placeholders, NotImplementedError)
      in Python files written/edited by Claude.

  hypothesis_router:
    class: observability
    fail_mode: open
    event: PostToolUse
    matcher: "Edit|Write"
    escalation: info
    description: >
      Auto-adds detected hypotheses to a tracker on Write events, per the
      research methodology's hypothesis-registration step.

  iteration_guard:
    class: quality
    fail_mode: open
    event: "PreToolUse|SubagentStop"
    matcher: Agent
    escalation: block
    description: >
      Enforces the Evaluator-Optimizer cap=3 iteration limit -- denies a 4th
      reviewer/builder cycle Agent call once 3 consecutive non-LGTM verdicts
      are reached (see F-04, security audit 2026-07-12, for the tamper-
      evidence signature protecting this counter's state file).

  boyko_protocol_guard:
    class: quality
    fail_mode: open
    event: SubagentStop
    matcher: ""
    escalation: warn
    description: >
      Flags a boyko-agent (agents/navigator.md) stop whose final message
      contains the "## Boyko Agent Brief" header but is missing one of its
      own required Output Format sections (CTA Card, Route trace, etc.) --
      the same class of "protocol defined in a prompt, never mechanically
      checked" gap this repo's own architecture principle warns against.
      Detection only (SubagentStop cannot force a sub-agent to keep
      working); recognizes the stop by message content, not subagent_type.

  null_results_pre_check:
    class: quality
    fail_mode: open
    event: UserPromptSubmit
    matcher: "*"
    escalation: warn
    description: >
      Warns if a proposed experiment/hypothesis was already falsified in
      null_results/, so a dead idea isn't silently re-run.

  null_retroscan:
    class: quality
    fail_mode: open
    event: PostToolUse
    matcher: "Edit|Write"
    escalation: warn
    description: >
      Retro-scans active PROMOTE claims when a new NULL result is written --
      research-methodology.md's "immediate retroscan" principle, enforced.

  pre_vault_write:
    class: quality
    fail_mode: open
    event: PreToolUse
    matcher: "Edit|Write"
    escalation: warn
    description: >
      Enforces Obsidian vault structure rules (personal projects out of
      repo-intel, metadata requires Path, docs in the right location).

  promotion_gate_guard:
    class: quality
    fail_mode: open
    event: "PreToolUse|PostToolUse"
    matcher: "Edit|Write"
    escalation: block
    description: >
      Enforces the FL Full-Ladder's 5 Perelman promotion conditions on
      decision.md before a claim can be marked PROMOTE.

  reject_gate_guard:
    class: quality
    fail_mode: open
    event: PostToolUse
    matcher: "Edit|Write"
    escalation: warn
    description: >
      Enforces the NULL Exploitation Gate: a REJECT decision.md must document
      both "what was killed" and "what opens next" (Relaxation Map).

  research_health_loop:
    class: observability
    fail_mode: open
    event: SessionStart
    matcher: "startup|resume|clear|compact"
    escalation: info
    description: >
      Weekly research-health audit -- flags zombie experiments (30+ days,
      no decision) and other silent research drift at session start.

  submission_gate_guard:
    class: quality
    fail_mode: open
    event: "UserPromptSubmit|PostToolUse"
    matcher: "Edit|Write"
    escalation: warn
    description: >
      Mechanically enforces rules/integrity.md's Submission Gate (F-03,
      security audit 2026-07-12) instead of relying on prose recall -- soft
      nudge only, see rules/integrity.md for the enforcement-strength caveat.

  weakened_test_guard:
    class: quality
    fail_mode: open
    event: "PreToolUse"
    matcher: "Edit|Write"
    escalation: block
    description: >
      Blocks tests weakened to force a pass (deleted assert, assert True,
      loosened comparison) -- the most common form of coding-loop
      validation theater. Upgraded 2026-07-17 from PostToolUse soft-nudge
      to PreToolUse hard block.

  doc_bridge:
    class: library
    description: >
      Universal document parser (PDF/Excel/CSV/TSV/JSON/DOCX to normalized
      dicts). Imported by file_auto_parser.py and the /data-bridge skill --
      not a standalone hook.

  doc_registry:
    class: library
    description: >
      Document deduplication registry: sha256(content) -> {parsed_summary,
      wiki_path, analysis_title, tags}. Imported by file_auto_parser.py --
      not a standalone hook.

  expert_registry:
    class: library
    description: >
      Compiled Expert Registry (RestrictedPython-sandboxed code compilation
      and reuse). Imported where invoked, not a standalone stdin/stdout hook.
      See F-08/F-14 (security audit 2026-07-12) for its sandboxing and
      regression-check-budget hardening.

  agent_context_filter:
    # WHY class: dormant (P0.4, follow-up audit 2026-07-13): has its own
    # main() and declares "Event: PreToolUse(Agent)" in its own docstring,
    # but is NOT registered anywhere in hooks/settings.json -- it never
    # fires today. Documented as found; enabling it is a separate decision.
    class: dormant
    description: >
      Context Asymmetry Hook for adversarial agents -- docstring declares
      intended event PreToolUse(Agent). Not currently registered.

  artifact_schema_validator:
    class: dormant
    description: >
      Validates JSON artifacts written to known experiment/metrics/results
      directories against a companion *.schema.json. Docstring declares
      intended event PostToolUse(Write|Edit). Not currently registered.

  file_auto_parser:
    class: dormant
    description: >
      Auto-parses file paths found in the user's message via doc_bridge,
      caching results in doc_registry. Docstring declares intended event
      UserPromptSubmit. Not currently registered.

  hook_observability:
    class: dormant
    description: >
      Lightweight universal event logger (records which event/tool fired,
      inspired by disler/claude-code-hooks-multi-agent-observability).
      No specific event found registered in hooks/settings.json.

  markitdown_auto_convert:
    class: dormant
    description: >
      Auto-converts new documents in raw/ (PDF/DOCX/PPTX/XLSX/HTML) to
      Markdown via markitdown. Docstring declares intended event
      SessionStart. Not currently registered.

  model_usage_tracker:
    class: observability
    fail_mode: open
    event: PostToolUse
    matcher: ""
    escalation: info
    description: >
      Append-only tool usage metrics log (response-byte-size token proxy),
      appended to ~/.claude/logs/model_usage.jsonl. Wired up 2026-07-18
      (was dormant since at least 2026-07-13): scripts/otel_exporter.py
      already reads this exact file and GLOSSARY.md documents its schema,
      but nothing was producing it -- a live orphaned-consumer gap, found
      during a Boyko Agent dogfood run, independently verified before wiring.

  smart_model_router:
    class: dormant
    description: >
      Recommends (does not auto-switch) the best model based on current
      usage via additionalContext. Docstring declares intended event
      SessionStart. Not currently registered.
