# Extension skills — installed on demand via skill-manager.sh or install.sh picker.
# Domain-specific, useful for particular industries/workflows.
extensions:
  - name: intended-vs-implemented
    category: security
    description: "Audit gap between documented behavior and actual code. Finds permissions unenforced, data leaks, broken README claims. Every finding requires cited evidence — no speculation. Triggers: /intended-vs-implemented, docs vs code, задокументировано vs реализовано, audit intent."
    triggers: [intended-vs-implemented, "docs vs code", "intent vs reality", "задокументировано vs реализовано", "audit intent", "verify documented behavior", "docs не совпадают"]
    tokens: ~600
    type: directory

  - name: ab-test
    category: analytics
    author: sboi
    version: 1.0.0
    description: "Rigorous A/B test analysis: SRM detection, peeking guard (mSPRT), two-proportion z-test, MCID check (practical vs statistical significance), guardrail monitoring. Ship/Extend/Stop/Investigate verdict. Integrates with estimand-ops.md."
    triggers: [ab-test, "a/b test", "split test", "experiment results", "проанализируй эксперимент", "результаты теста", "A/B анализ", "significance", "конверсия"]
    tokens: ~500
    type: directory

  - name: wealth-protocol
    category: strategy
    author: community
    version: 0.1.0
    description: "Validation-first diagnostic for specific knowledge, leverage stack, productization, and time-for-money leaks. 6 modes: excavate/audit/productize/escape/validate/full. Evidence tags: <fact>/<hypothesis>/<risk>. No income guarantees. Kill criterion required for every recommendation."
    triggers: ["wealth-protocol", "найди мою нишу", "аудит leverage", "productize expertise", "уйти от почасовой", "монетизация экспертизы", "Naval Ravikant", "specific knowledge", "leverage audit", "time-for-money", "productized service", "build a business from knowledge"]
    tokens: ~800
    type: directory

  - name: pre-mortem
    category: planning
    author: community
    version: 1.0.0
    description: "Launch risk analysis before feature release or major merge. Classifies risks as Tigers (real, evidence-backed), Paper Tigers (unlikely), or Elephants (unspoken assumptions). Complements DDD/skeptic for design; targets execution risks."
    triggers: [pre-mortem, "что может пойти не так", "риски запуска", "launch risks", "imagine failure", "before we ship", "перед релизом"]
    tokens: ~300
    type: directory

