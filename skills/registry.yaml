  - name: hd-mavp-router
    version: 1.0.0
    author: sboi
    depends_on: [claim-decomposer, sci-evidence, consilience, proof-ladder, hypothesis-arbiter, skeptic]
    description: "Роутер комплексного аудита с 5 run_modes: quick / full / math_code / contradiction / decision_record. Оркестрирует claim-decomposer + нужные скиллы в правильном порядке. Сохраняет единый контекст для Contradiction Map, параллелит только независимые проверки."
    triggers: ["/hd-mavp", "/audit-full", "/hd-mavp-router", "полный аудит утверждения", "комплексная проверка", "глубокий аудит", "выбери режим аудита"]
