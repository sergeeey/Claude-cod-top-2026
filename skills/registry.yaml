# Skills Registry v2.0
# Central index of all available skills — core and extensions.
# Used by skill-manager.sh for install/remove/search operations.
#
# SCHEMA (per skill entry):
#   name, description, triggers, tokens, type        — required (existing)
#   category, effort, url, repository, install, stars — optional (existing)
#   version    — semver of the skill itself (reproducibility). Add when known.
#   depends_on — skills/rules/MCPs this skill needs; dispatcher loads them first.
#   author     — origin: "sboi" | "claude" | "community" (audit/trust).
# Runtime metrics (last_used, hit_count) deliberately NOT here — they are
# machine-local state and live in .claude/memory/, never in this committed file.

registry_version: 2

# Core skills — installed by default with standard/full profiles.
# Universal, domain-agnostic, useful for any developer.
core:
  - name: routing-policy
    description: "Task→skill→agent routing matrix. Determines optimal execution path for any request."
    triggers: [task, implement, fix, debug, review, plan]
    tokens: ~200
    type: directory

  - name: dispatcher
    version: 1.0.0
    author: claude
    depends_on: [routing-policy, "project_classifier(hook)"]
    description: "Нервный узел: определяет тип проекта (research/production/MVP/data-science) + тип задачи → грузит ровно нужную методологию, а не все тяжёлые правила всегда. Читает project_profile.md (хук project_classifier), арбитрит спорное по намерению. Гибрид хук+LLM."
    triggers: [dispatcher, какой подход, какую методологию, настройся на проект, это какой проект, подбери подход, онбординг проекта]
    tokens: ~300
    type: directory

  - name: brainstorming
    description: "Socratic Design — 2-3 alternatives with trade-offs before coding."
    triggers: [brainstorm, design, alternatives, options, think]
    tokens: ~180
    type: directory

  - name: tdd-workflow
    description: "Test-Driven Development workflow. RED→GREEN→REFACTOR cycle."
    triggers: [tdd, test-first, red-green, test-driven]
    tokens: ~150
    type: directory

  - name: git-worktrees
    description: "Isolated working copies for experiments and parallel branch work."
    triggers: [worktree, experiment, parallel, isolated]
    tokens: ~120
    type: directory

  - name: mentor-mode
    description: "Pedagogical mode with analogies. Explains concepts from scratch."
    triggers: [explain, teach, how-does, why, mentor]
    tokens: ~100
    type: directory

  - name: mcp-installer
    description: "Step-by-step MCP server installation guide."
    triggers: [mcp, install, server, setup]
    tokens: ~80
    type: file

  - name: reference-registry
    description: "Systematic external reference lookup from references.md."
    triggers: [reference, check-external, compare, competitor, benchmark, look-up]
    tokens: ~150
    type: directory

  - name: agent-teams
    description: "Agent Teams orchestration — parallel review, build, and research."
    triggers: [team, squad, parallel-agents, review-squad, build-squad, research-squad]
    tokens: ~200
    type: directory

  - name: context-engineering
    description: "Context window management — what to load, when, and how much. Prevents context bloat."
    triggers: [context, context-window, load-context, context-engineering, what-to-load]
