    depends_on: [skeptic, "estimand-ops(rule)"]
    description: "Мост дизайн→проверка: читает estimand.md и превращает MCID/ICE/endpoint в конкретные вопросы для skeptic + go/no-go критерии. Без него estimand.md мёртв — Skeptic проверяет по общим триггерам, не по твоим MCID/ICE. Enforce-ит 'результат ≥ MCID' и 'ICE стратегией, не imputation'."
    triggers: [estimand-bridge, проверь по estimand, результат значим, enforce MCID, проверь ICE, estimand gate, связать estimand со skeptic]
    tokens: ~350
    type: directory

  - name: boyko-method
    category: research
    version: 1.1.0
    author: claude
    depends_on: [multi-lens, skeptic, "falsification-ladder(rule)", "estimand-ops(rule)"]
    description: "Полный сквозной цикл анализа: Атомизация → Линзы → Связи → Сборка → Проверка. Оркестратор — делегирует линзы скиллу multi-lens, проверку — skeptic/falsification-ladder. Для сложных объектов: превращает мутную проблему в проверяемую модель. Не дублирует существующее, а связывает."
    triggers: [boyko, метод бойко, полный разбор, разложи и собери, системный анализ от и до, построй модель проблемы, атомизируй и проверь]
    tokens: ~400
